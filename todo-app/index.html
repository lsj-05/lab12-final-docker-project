<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Todo待办应用</title>
    <style>
        body { width: 600px; margin: 50px auto; font-family: Microsoft Yahei; }
        .input-area { margin-bottom: 20px; }
        input { width: 450px; padding: 8px; font-size: 16px; }
        button { padding: 8px 16px; background: #007acc; color: white; border: none; border-radius: 4px; }
        li { margin: 8px 0; font-size: 16px; }
    </style>
</head>
<body>
    <h1>待办清单 Todo App</h1>
    <div class="input-area">
        <input type="text" id="taskInput" placeholder="请输入待办任务">
        <button onclick="addTask()">添加任务</button>
    </div>
    <ul id="taskList"></ul>

    <script>
        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (!text) return;
            const li = document.createElement('li');
            li.innerText = text;
            document.getElementById('taskList').appendChild(li);
            input.value = '';
        }
    </script>
</body>
</html>
